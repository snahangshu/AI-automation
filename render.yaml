services:
  - type: web
    name: fastigo-agent-monolith
    env: docker
    plan: starter # Important: Use Starter (2GB) for scraping + AI models
    region: singapore
    envVars:
      - key: PORT
        value: 8000
      - fromGroup: fastigo-secrets

envVarGroups:
  - name: fastigo-secrets
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_DB_URI
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS
        sync: false
